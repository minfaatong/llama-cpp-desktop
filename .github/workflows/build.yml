name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Delete existing release for this version if any
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release delete "v${VERSION}" --yes --cleanup-tag 2>/dev/null || true

      - name: Auto-bump patch version
        id: bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git add package.json
          git commit -m "chore: bump to v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --tags

  build:
    needs: version
    strategy:
      matrix:
        config:
          - os: windows-latest
            arch: win-x64
          - os: macos-latest
            arch: mac-arm64
          - os: ubuntu-latest
            arch: linux-x64
          - os: ubuntu-latest
            arch: linux-arm64
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up QEMU for ARM64
        if: ${{ matrix.config.arch == 'linux-arm64' }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - run: npm ci

      - name: Install system deps (Linux)
        if: startsWith(matrix.config.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Build
        run: npm run dist

      - name: Clean non-artifact files from dist
        shell: bash
        run: |
          rm -rf dist/*-unpacked dist/builder-debug.yml dist/builder-effective-config.yaml 2>/dev/null

      - name: Rename artifact
        shell: bash
        run: |
          for f in dist/*.{exe,dmg,AppImage}; do
            [ -f "$f" ] || continue
            ext="${f##*.}"
            base="$(basename "$f" ".${ext}")"
            dir="$(dirname "$f")"
            name="${base%-x64}"
            name="${name%-arm64}"
            mv "$f" "${dir}/Llama.cpp-Desktop-${{ needs.version.outputs.version }}-${{ matrix.config.arch }}.${ext}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.config.arch }}
          path: dist/*.{exe,dmg,AppImage}

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Llama.cpp Desktop v${{ needs.version.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: false
          generate_release_notes: true
