name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Delete existing release & tag for current version
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "v$(node -p "require('./package.json').version")" --yes --cleanup-tag 2>/dev/null || true

      - name: Auto-bump patch version
        id: bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git add package.json
          git commit -m "chore: bump to v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "Llama.cpp Desktop v${{ steps.bump.outputs.version }}" \
            --generate-notes \
            --draft

  build:
    needs: version
    strategy:
      matrix:
        config:
          - os: windows-latest
            arch: win-x64
          - os: macos-latest
            arch: mac-arm64
          - os: ubuntu-latest
            arch: linux-x64
          - os: ubuntu-latest
            arch: linux-arm64
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up QEMU for ARM64
        if: ${{ matrix.config.arch == 'linux-arm64' }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - run: npm ci

      - name: Install system deps (Linux)
        if: startsWith(matrix.config.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Build
        run: npm run dist

      - name: Clean non-artifact files from dist
        shell: bash
        run: |
          rm -rf dist/*-unpacked dist/builder-debug.yml dist/builder-effective-config.yaml 2>/dev/null

      - name: Upload build to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          ARCH="${{ matrix.config.arch }}"
          dist_dir="dist"

          for f in "${dist_dir}"/*.exe "${dist_dir}"/*.dmg "${dist_dir}"/*.AppImage; do
            [ -f "$f" ] || continue
            ext="${f##*.}"
            base="$(basename "$f" ".${ext}")"
            dir="$(dirname "$f")"
            name="${base%-x64}"
            name="${name%-arm64}"
            renamed="${dir}/Llama.cpp-Desktop-${VERSION}-${ARCH}.${ext}"
            mv "$f" "$renamed"
            gh release upload "v${VERSION}" "$renamed" --clobber
          done

  publish:
    if: always()
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (remove draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "v${{ needs.version.outputs.version }}" --draft=false
