  contents: write

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run dist

      - name: Generate checksum
        shell: bash
        run: |
          cd dist
          for file in *; do
            if [[ "$file" == *".exe" || "$file" == *".dmg" || "$file" == *".AppImage" ]]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          name: Llama.cpp Desktop ${{ github.ref_name }}
          files: dist/**/*
