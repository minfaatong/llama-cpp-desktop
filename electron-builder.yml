appId: local.llamacpp.desktop
productName: Llama.cpp Desktop
directories:
  output: dist
files:
  - assets/**
  - desktop/**
  - renderer/**
  - package.json
win:
  icon: assets/llama-cpp.ico
  target:
    - portable
  artifactName: Llama.cpp-Desktop.${ext}
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
asar: true
compression: normal
